services:
  - type: web
    name: lux-auction-multiplayer
    runtime: node
    plan: free
    rootDir: lux-auction-multiplayer-fixed
    region: singapore
    buildCommand: yarn install --non-interactive && yarn build
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
